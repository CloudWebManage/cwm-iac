isPrimary: false
allowedPrimaryKey: ""

cwmCdnApi:
  api:
    image: "ghcr.io/cloudwebmanage/cwm-cdn-api:latest"

prometheus:
  server:
    tolerations:
      - key: "cwm-iac-worker-role"
        operator: "Equal"
        value: "system"
        effect: "NoExecute"

    persistentVolume:
      storageClass: longhorn

    retention: "2d"

  serverFiles:
    prometheus.yml:
      rule_files:
        - /etc/config/alerting_rules.yml
      scrape_configs:
        - job_name: edge-nginx
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "cdn-edge-nginx"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
        - job_name: tenant
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "tenant"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
        - job_name: cache-router
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "router"
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: "cdn-cache"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
        - job_name: cache
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "cache.*"
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: "cdn-cache"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
        - job_name: kubelet-cadvisor
          scheme: https
          metrics_path: /metrics/cadvisor
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
          tls_config:
            insecure_skip_verify: true
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              target_label: __metrics_path__
              replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
          metric_relabel_configs:
            - source_labels: [namespace]
              action: keep
              regex: cdn-cache
            - source_labels: [__name__]
              action: keep
              regex: container_fs_(usage_bytes|limit_bytes|inodes_used|inodes_total)
    alerting_rules.yml:
      groups:
        - name: cdn-cache-capacity
          rules:
            - alert: CdnCacheHighRequestRate
              expr: sum(rate(nginx_http_requests_total{job=~"cache|cache-router"}[5m])) > 1000
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache/router request rate is high
                description: Review cache/router capacity and add cache shards if sustained request rate remains high.
            - alert: CdnCacheLowHitRatio
              expr: sum(rate(nginx_http_requests_total{job="cache",host!="_"}[10m])) / clamp_min(sum(rate(nginx_http_requests_total{job="cache"}[10m])), 1) < 0.5
              for: 30m
              labels:
                severity: warning
              annotations:
                summary: CDN cache hit ratio appears low
                description: Review tenant traffic patterns and cache shard capacity before manually scaling cache.
            - alert: CdnCacheShardDiskUsageHigh
              expr: max by (pod) (container_fs_usage_bytes{namespace="cdn-cache",pod=~"cache.*"} / clamp_min(container_fs_limit_bytes{namespace="cdn-cache",pod=~"cache.*"}, 1)) > 0.85
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache shard filesystem usage is high
                description: Cache shard filesystem usage is above 85%; manually add or resize cache capacity.
            - alert: CdnCacheShardInodeUsageHigh
              expr: max by (pod) (container_fs_inodes_used{namespace="cdn-cache",pod=~"cache.*"} / clamp_min(container_fs_inodes_total{namespace="cdn-cache",pod=~"cache.*"}, 1)) > 0.85
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache shard inode usage is high
                description: Cache shard inode usage is above 85%; manually add or resize cache capacity.


  alertmanager:
    enabled: false

  kube-state-metrics:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  prometheus-pushgateway:
    enabled: false

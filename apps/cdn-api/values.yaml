isPrimary: false
allowedPrimaryKey: ""
popId: ""

cacheAdmin:
  enabled: true
  tokenSecretName: cwm-cdn-cache-admin
  tokenSecretKey: token
  endpoints:
    - cache1=http://cache1.cdn-cache:8081
    - cache2=http://cache2.cdn-cache:8081
    - cache3=http://cache3.cdn-cache:8081

secondaries:
  jsonSecretName: cwm-cdn-tenants-config
  jsonSecretKey: apiSecondaries.json

policy:
  enabled: false
  trustedClientIp:
    enabled: false
    trustedProxyCidrs: []
  captcha:
    egressEnabled: false

logs:
  structured: true
  platform: false

popHealth:
  enabled: true

route53DnsAutomation:
  enabled: false
  dryRun: false

cwmCdnApi:
  api:
    image: "ghcr.io/cloudwebmanage/cwm-cdn-api:latest"

vmagent:
  clusterLabel: ""
  remoteWrite:
    baseUrl: ""
    username: ""
    password: ""

prometheus:
  server:
    tolerations:
      - key: "cwm-iac-worker-role"
        operator: "Equal"
        value: "system"
        effect: "NoExecute"

    persistentVolume:
      storageClass: longhorn

    retention: "2d"

  serverFiles:
    prometheus.yml:
      rule_files:
        - /etc/config/alerting_rules.yml
      scrape_configs:
        - job_name: edge-nginx
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "cdn-edge-nginx"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
        - job_name: tenant
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "tenant"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
            - source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
        - job_name: cache-router
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "router"
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: "cdn-cache"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
        - job_name: cache
          metrics_path: /metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: "cache.*"
            - source_labels: [__meta_kubernetes_namespace]
              action: keep
              regex: "cdn-cache"
            - source_labels: [__meta_kubernetes_pod_ip]
              action: replace
              target_label: __address__
              replacement: $1:9999
    alerting_rules.yml:
      groups:
        - name: cdn-cache-capacity
          rules:
            - alert: CdnCacheHighRequestRate
              expr: sum(rate(nginx_http_requests_total{job=~"cache|cache-router"}[5m])) > 1000
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache/router request rate is high
                description: Review cache/router capacity and add cache shards if sustained request rate remains high.
            - alert: CdnCacheLowHitRatio
              expr: sum(rate(nginx_http_requests_total{job="cache",host!="_"}[10m])) / clamp_min(sum(rate(nginx_http_requests_total{job="cache"}[10m])), 1) < 0.5
              for: 30m
              labels:
                severity: warning
              annotations:
                summary: CDN cache hit ratio appears low
                description: Review tenant traffic patterns and cache shard capacity before manually scaling cache.


  alertmanager:
    enabled: false

  kube-state-metrics:
    enabled: false

  prometheus-node-exporter:
    enabled: false

  prometheus-pushgateway:
    enabled: false

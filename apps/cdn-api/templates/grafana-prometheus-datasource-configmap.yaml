apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-cdn-prom
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: cdn-prom
        type: prometheus
        url: http://cdn-api-prometheus-server.cdn-api:80/

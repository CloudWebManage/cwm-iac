prometheusNagiosSender:
  enabled: false
  debug: false
  dryRun: false

x-tolerations: &tolerations
  - key: "cwm-iac-worker-role"
    operator: "Equal"
    value: "system"
    effect: "NoExecute"

kube-prometheus-stack:
  additionalPrometheusRulesMap:
    cdn-cache-capacity:
      groups:
        - name: cdn-cache-capacity
          rules:
            - alert: CdnCacheShardDiskUsageHigh
              expr: max by (namespace, pod) (container_fs_usage_bytes{job="kubelet", metrics_path="/metrics/cadvisor", namespace="cdn-cache", pod=~"cache.*"} / clamp_min(container_fs_limit_bytes{job="kubelet", metrics_path="/metrics/cadvisor", namespace="cdn-cache", pod=~"cache.*"}, 1)) > 0.85
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache shard filesystem usage is high
                description: Cache shard filesystem usage is above 85%; manually add or resize cache capacity.
            - alert: CdnCacheShardInodeUsageHigh
              expr: max by (namespace, pod) (container_fs_inodes_used{job="kubelet", metrics_path="/metrics/cadvisor", namespace="cdn-cache", pod=~"cache.*"} / clamp_min(container_fs_inodes_total{job="kubelet", metrics_path="/metrics/cadvisor", namespace="cdn-cache", pod=~"cache.*"}, 1)) > 0.85
              for: 15m
              labels:
                severity: warning
              annotations:
                summary: CDN cache shard inode usage is high
                description: Cache shard inode usage is above 85%; manually add or resize cache capacity.

  crds:
    upgradeJob:
      tolerations: *tolerations
  alertmanager:
    alertmanagerSpec:
      tolerations: *tolerations
      resources:
        requests:
          cpu: 400m
          memory: 300Mi
        limits:
          memory: 500Mi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            resources:
              requests:
                storage: 5Gi

  grafana:
    tolerations: *tolerations
    deleteDatasources:
      - name: "cdn-prometheus"
        orgId: 1
    resources:
      requests:
        cpu: 500m
        memory: 400Mi
      limits:
        memory: 800Mi
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 5Gi
    admin:
      existingSecret: "grafana-admin-password"
    additionalDataSources:
      - name: "Loki"
        type: loki
        url: "http://logging-loki-gateway.logging"
        jsonData:
          maxLines: 1000
          timeout: 60

  prometheusOperator:
    admissionWebhooks:
      deployment:
        tolerations: *tolerations
      patch:
        tolerations: *tolerations
    tolerations: *tolerations
    namespaces: {}
    denyNamespaces: []
    resources:
      requests:
        cpu: 200m
        memory: 200Mi
      limits:
        memory: 400Mi

  prometheus:
    prometheusSpec:
      tolerations: *tolerations
      retention: 7d
      resources:
        requests:
          cpu: 400m
          memory: 600Mi
        limits:
          memory: 1200Mi
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            resources:
              requests:
                storage: 100Gi
      podMonitorSelector:
        matchLabels: {}
  kubeEtcd:
    enabled: false

  kubeScheduler:
    enabled: false

  kubeControllerManager:
    enabled: false

  kubeProxy:
    enabled: false

  kube-state-metrics:
    tolerations: *tolerations

  nodeExporter:
    enabled: true
    operatingSystems:
      linux:
        enabled: true
      aix:
        enabled: false
      darwin:
        enabled: false

  prometheus-node-exporter:
    tolerations:
      - key: "cwm-iac-worker-role"
        operator: "Exists"
        effect: "NoExecute"
      - key: CriticalAddonsOnly
        operator: Exists

apiVersion: v1
kind: ConfigMap
metadata:
  name: cdn-edge
data:
  nginx.conf: |
    worker_processes 10;
    pcre_jit on;
    error_log  stderr  error;

    events {
        worker_connections  10240;
    }

    stream {
      lua_shared_dict prometheus_metrics 16m;

      init_worker_by_lua_block {
          prometheus = require("prometheus").init("prometheus_metrics")
          metric_connections = prometheus:counter("nginx_stream_connections_total", "Number of Stream connections", {"server_name"})
      }

      preread_by_lua_block {
          local sni = ngx.var.ssl_preread_server_name or ""
          metric_connections:inc(1, {sni})
      }

      resolver __RESOLVER_IP__ valid=30s ipv6=off;
      resolver_timeout 2s;

      server {
        listen 443;
        ssl_preread on;
        proxy_connect_timeout 10s;
        proxy_timeout 300s;
        proxy_pass $ssl_preread_server_name:443;
      }

      server {
        listen 9999;
        content_by_lua_block {
          local metrics = table.concat(prometheus:metric_data(), "")
          ngx.print("HTTP/1.1 200 OK\r\n")
          ngx.print("Content-Type: text/plain\r\n")
          ngx.print("Content-Length: " .. #metrics .. "\r\n\r\n")
          ngx.print(metrics)
        }
      }
    }

    http {
      access_log off;
      resolver __RESOLVER_IP__ valid=30s ipv6=off;
      resolver_timeout 2s;

      server {
        listen 80;
        server_name _;

        location ^~ /.well-known/acme-challenge/ {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto http;
          proxy_connect_timeout 10s;
          proxy_read_timeout 300s;
          proxy_pass http://$host:80;
        }

        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto http;
          proxy_connect_timeout 10s;
          proxy_read_timeout 300s;
          proxy_pass http://$host:80;
        }
      }
    }

  Corefile: |
    .:5353 {
      auto {
        directory /data/zones (.*)\.db$ {1}
        reload 1s
      }
      cache 30
      errors
      health :8181
      forward . 169.254.20.10
    }
